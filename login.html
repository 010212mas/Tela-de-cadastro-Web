<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testes de Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <script src="js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-6 card mt-4 p-4">
                    <h1 class="text-center">Faça o seu Login</h1>
                    <form action="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" id="senha" name="senha" class="form-control" required>
                        </div>
                        <button class="btn btn-primary w-100 mb-2" type="submit">Entrar</button>
                        <button class="btn btn-secondary w-100" type="button" onclick="window.location.href='cadastro.html'">Cadastrar</button>
                    </form>
            </div>
        </div>
    </div>
    <script>
        const form = document.querySelector('form');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Impede o envio do formulário para outra tela

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;


            //validação de login pelo localStorage
            const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
            const usuarioEncontrado = usuarios.find(u => u.email === email && u.senha === senha);
            if (usuarioEncontrado) {
                alert('Login bem-sucedido!');
                // Salva o usuário logado na sessão
                sessionStorage.setItem('usuarioLogado', usuarioEncontrado.usuario);
                // Redirecionar para a página principal ou dashboard
                window.location.href = 'dashboard.html';
            } else {
                alert('Usuário ou senha incorretos!');
            }
        });
    </script>
</body>

</html>
