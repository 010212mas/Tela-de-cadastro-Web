<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastros</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <script src="js/bootstrap.bundle.min.js"></script>

</head>
<style>
    th, td {
        padding: 10px;
        text-align: left;
    }
    body{
        background-color: #202020;
        color:white
    }
</style>
<body>

    <!--Visualizar Usuários-->

    <div class="container">
         <button class="btn btn-danger mt-3 btn-sm" onclick="window.location.href='cadastro.html'">Voltar para Cadastro</button>
    <button class="btn btn-success mt-3 btn-sm text-white" onclick="window.location.href='dashboard.html'">Voltar ao meu usuário</button>

        <h1>Usuários Cadastrados</h1>

        <div class="row" id="listaUsuarios">
            <div id="dadosUsuario" style="margin-top:20px;">
                <script>
                    // Função para exibir todos os usuários cadastrados
                    function exibirTodosUsuarios() {
                        const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
                        const listaDiv = document.getElementById('listaUsuarios');
                        if (usuarios.length === 0) {
                            listaDiv.innerHTML = '<p>Nenhum usuário cadastrado.</p>';
                            return;
                        }
                        let html = '<table border="1" cellpadding="5" style="border-collapse:collapse;">';
                        html += '<tr><th>Usuário</th><th>E-mail</th></tr>';
                        usuarios.forEach(u => {
                            html += `<tr><td>${u.usuario}</td><td>${u.email}</td></tr>`;
                        });
                        html += '</table>';
                        listaDiv.innerHTML = html;
                    }

                    // Chama a função ao carregar a página
                    window.onload = exibirTodosUsuarios;
                </script>

            </div>
        </div>
</body>

</html>
