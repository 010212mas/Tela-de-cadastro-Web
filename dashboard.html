<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard</title>

	<link rel="stylesheet" href="css/bootstrap.min.css">
	<script src="js/bootstrap.bundle.min.js"></script>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-sm-6 card mt-4 p-4">
				<h3>Acesso realizado com sucesso</h3>
				<div id="dadosUsuario"></div>
				<button class="btn btn-danger mt-3" id="logout">Sair</button>

				<button class="btn btn-secondary mt-3" onclick="window.location.href='deletar.html'">Limpar
					Dados</button>

				<button class="btn btn-info mt-3" onclick="window.location.href='usuarios.html'">Visualizar
					Usuários</button>

			</div>
		</div>
	</div>


	</div>
	<script>
		// Recupera usuário logado do localStorage
		function obterUsuarioLogado() {
			// Recupera o último login realizado
			const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
			const nome = sessionStorage.getItem('usuarioLogado');
			if (!nome) return null;
			return usuarios.find(u => u.usuario === nome);
		}

		// Exibe os dados do usuário logado
		function exibirDadosUsuario() {
			const usuario = obterUsuarioLogado();
			const div = document.getElementById('dadosUsuario');
			if (usuario) {
				div.innerHTML = `<p><strong>Usuário:</strong> ${usuario.usuario}</p><p><strong>E-mail:</strong> ${usuario.email}</p>`;
			} else {
				div.innerHTML = '<p>Usuário não autenticado. <a href="login.html">Faça login</a>.</p>';
				document.getElementById('logout').style.display = 'none';
			}
		}

		// Logout
		document.getElementById('logout').onclick = function () {
			sessionStorage.removeItem('usuarioLogado');
			window.location.href = 'login.html';
		};
		//limpar dados do localStorage para testes
		//localStorage.removeItem('usuarios');

		exibirDadosUsuario();
	</script>

</body>

</html>
